spring:
  application:
    name: rag-knowledge-service

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/ragwebui?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ragwebui
    password: ragwebui
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      filter:
        stat:
          slow-sql-millis: 1000
          log-slow-sql: true
        wall:
          config:
            drop-table-allow: false

  mybatis-plus:
    mapper-locations:
      - classpath:mapper/**/*.xml
    configuration:
      mapUnderscoreToCamelCase: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

  cloud:
    nacos:
      username: nacos
      password: nacos
      discovery:
        namespace: public
        group: DEFAULT_GROUP
        server-addr: 127.0.0.1:8848
      config:
        namespace: public
        group: DEFAULT_GROUP
        file-extension: yaml
        server-addr: 127.0.0.1:8848
        timeout: 5000
        extension-configs:
          - data-id: ${spring.application.name}.yaml
            group: DEFAULT_GROUP
            refresh: false # 配置文件是否动态刷新，对于一些配置文件，有可能会有缓存此时需要使用@RefreshScope注解 一般动态刷新的都是 @Value注解的配置

logging:
  level:
    com.chuhezhe.raguserservice.feign: DEBUG
    feign: DEBUG
