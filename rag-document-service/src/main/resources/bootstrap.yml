spring:
  application:
    name: rag-document-service

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/ragwebui?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ragwebui
    password: ragwebui
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      filter:
        stat:
          slow-sql-millis: 1000
          log-slow-sql: true
        wall:
          config:
            drop-table-allow: false

  mybatis-plus:
    mapper-locations:
      - classpath:mapper/**/*.xml
    configuration:
      mapUnderscoreToCamelCase: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

  cloud:
    nacos:
      username: nacos
      password: nacos
      discovery:
        namespace: public
        group: DEFAULT_GROUP
        server-addr: 127.0.0.1:8848
      config:
        namespace: public
        group: DEFAULT_GROUP
        file-extension: yaml
        server-addr: 127.0.0.1:8848
        time-out: 5000
        extension-configs:
          - data-id: ${spring.application.name}.yaml
            group: DEFAULT_GROUP
            refresh: false

  # US-010 Option B：原先在这里配的 spring.ai.vectorstore.chroma 已经移除——
  # 向量化 + ChromaDB 写入都由 rag-ai-service 负责，Java 通过 Feign 打
  # /internal/embed-and-index 委托即可，无需持有 chroma 连接

logging:
  level:
    # 打印 Gateway 路由匹配日志
    org.springframework.cloud.gateway: DEBUG
    # 打印服务发现日志
    com.alibaba.cloud.nacos: DEBUG

document:
  processing:
    chunk-size: 1000
    chunk-overlap: 200
  temp-dir: /tmp/documents

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: documents